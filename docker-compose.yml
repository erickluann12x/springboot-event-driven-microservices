services:

  postgres-order:
    image: postgres:16-alpine
    container_name: postgres-order

    environment:
      POSTGRES_DB: ${ORDER_DB_NAME}
      POSTGRES_USER: ${ORDER_DB_USER}
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}

    ports:
      - "5433:5432"

    volumes:
      - postgres_order_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ORDER_DB_USER} -d  ${ORDER_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:16-alpine
    container_name: postgres-payment

    environment:
      POSTGRES_DB: ${PAYMENT_DB_NAME}
      POSTGRES_USER: ${PAYMENT_DB_USER}
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD}

    ports:
      - "5434:5432"

    volumes:
      - postgres_payment_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENT_DB_USER} -d ${PAYMENT_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  order-service:

    image: erickluan7x/erickluan-order-service:latest

    container_name: order-service

    ports:
      - "8080:8080"

    environment:

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-order:5432/${ORDER_DB_NAME}

      SPRING_DATASOURCE_USERNAME: ${ORDER_DB_USER}

      SPRING_DATASOURCE_PASSWORD: ${ORDER_DB_PASSWORD}

      AWS_REGION: ${AWS_REGION}

      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}

      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}

      AWS_ORDER_TOPIC: ${AWS_ORDER_TOPIC}

    depends_on:
      postgres-order:
        condition: service_healthy

    restart: on-failure

  payment-service:

    image: erickluan7x/erickluan-payment-service:latest

    container_name: payment-service

    ports:
      - "8081:8081"

    environment:

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-payment:5432/${PAYMENT_DB_NAME}

      SPRING_DATASOURCE_USERNAME: ${PAYMENT_DB_USER}

      SPRING_DATASOURCE_PASSWORD: ${PAYMENT_DB_PASSWORD}

      AWS_REGION: ${AWS_REGION}

      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}

      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}

      AWS_PAYMENT_TOPIC: ${AWS_PAYMENT_TOPIC}

    depends_on:
      postgres-payment:
        condition: service_healthy

    restart: on-failure

  notification-service:

    image: erickluan7x/notification-service:latest

    container_name: notification-service

    environment:

      AWS_REGION: ${AWS_REGION}

      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}

      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}

    depends_on:
      payment-service:
        condition: service_started

    restart: on-failure

volumes:

  postgres_order_data:

  postgres_payment_data: